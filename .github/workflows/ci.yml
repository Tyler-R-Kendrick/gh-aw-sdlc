name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=api
      - run: npm run test:api

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=frontend
      - run: npm run lint

  workflow-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Install act
        shell: bash
        run: |
          curl -s https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash -s -- -b /usr/local/bin
          act --version
      - name: Install gh-aw
        shell: bash
        run: |
          if gh aw version; then
            exit 0
          elif gh extension install github/gh-aw; then
            gh aw version
          else
            curl -sL https://raw.githubusercontent.com/github/gh-aw/main/install-gh-aw.sh | bash
            gh aw version
          fi
      - run: npm run test:workflows
