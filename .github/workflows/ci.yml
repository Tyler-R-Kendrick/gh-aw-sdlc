name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=api
      - run: npm run test:api

  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=frontend
      - run: npm run lint

  workflow-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Install act
        shell: bash
        run: |
          ACT_VERSION="v0.2.87"
          ACT_ARCHIVE="act_Linux_x86_64.tar.gz"
          ACT_SHA256="9bbfca7d779f71746233ec65e47fdcb12c4c976c1c97ec085956976fcabee866"

          curl -fsSL -o "/tmp/${ACT_ARCHIVE}" "https://github.com/nektos/act/releases/download/${ACT_VERSION}/${ACT_ARCHIVE}"
          echo "${ACT_SHA256}  /tmp/${ACT_ARCHIVE}" | sha256sum -c -
          sudo tar -xzf "/tmp/${ACT_ARCHIVE}" -C /usr/local/bin act
          act --version
      - name: Install gh-aw
        shell: bash
        run: |
          if gh aw version; then
            exit 0
          elif gh extension install github/gh-aw; then
            gh aw version
          else
            curl -sL https://raw.githubusercontent.com/github/gh-aw/main/install-gh-aw.sh | bash
            gh aw version
          fi
      - run: npm run test:workflows
